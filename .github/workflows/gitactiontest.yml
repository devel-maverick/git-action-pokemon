name: git action test automation
on:
   push:
       branches: [main]
jobs:
    test-job:
     runs-on: ubuntu-latest
     defaults:
       run:
         working-directory: backend
     steps:
         - name: checkout repo
           uses: actions/checkout@v4
           
         - name: initialise node
           uses: actions/setup-node@v4

         - name: install node
           run: npm install

         - name: test backend
           run: npm test
