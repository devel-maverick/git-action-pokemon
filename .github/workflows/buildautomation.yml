name: frontend build automation
on:
   push:
       branches: [main]
jobs:
    test-job:
     runs-on: ubuntu-latest
     defaults:
       run:
         working-directory: frontend
     steps:
         - name: checkout repo
           uses: actions/checkout@v4
           
         - name: initialise node
           uses: actions/setup-node@v4
          
         - name: install node
           run: npm install
          
         - name: build frontend
           run: npm run build
           
        
           
